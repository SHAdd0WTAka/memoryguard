name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']
        include:
          - os: macos-latest
            python-version: '3.11'
          - os: windows-latest
            python-version: '3.11'

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install pytest pytest-asyncio pytest-cov
    
    - name: Run tests
      run: pytest tests/ -v --tb=short
      continue-on-error: false
    
    - name: Run tests with coverage
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: pytest tests/ --cov=memoryguard --cov-report=xml --cov-report=term-missing --cov-fail-under=80
    
    - name: Upload coverage
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        verbose: true

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install black flake8 mypy
        pip install -e ".[dev]"
    
    - name: Check formatting with black
      run: black --check memoryguard/ tests/ || true
    
    - name: Lint with flake8
      run: flake8 memoryguard/ tests/ --max-line-length=100 --extend-ignore=E203,W503 || true
    
    - name: Type check with mypy
      run: mypy memoryguard/ || true

  memory-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -e ".[all]"
    
    - name: Run basic memory tests
      run: |
        python -c "
        from memoryguard import MemoryGuard
        guard = MemoryGuard()
        print('✅ MemoryGuard imports successfully')
        
        # Basic test
        guard.check_memory('test')
        print('✅ Basic memory check works')
        
        # Generate report
        report_path = guard.generate_report('memory-report.json')
        print(f'✅ Report generated: {report_path}')
        "
    
    - name: Upload memory report
      uses: actions/upload-artifact@v4
      with:
        name: memory-report
        path: memory-report.json
        if-no-files-found: ignore
